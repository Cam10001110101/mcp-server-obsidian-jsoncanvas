name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --extra dev --frozen
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Test
        run: uv run pytest

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Audit dependencies for known vulnerabilities
        # PYSEC-2025-183 (CVE-2025-45768): disputed pyjwt advisory with no fix
        # release; pyjwt is only reachable via mcp's optional OAuth path, which
        # this server does not use.
        run: uv run --with pip-audit pip-audit --ignore-vuln PYSEC-2025-183
